<!DOCTYPE html>
<!--
  WaveComputing.org — Cortical Eigenmode Teaser
  ──────────────────────────────────────────────
  Framer AI embedding instructions:
  1. Host this file at a public URL (e.g. GitHub Pages, Cloudflare Pages)
  2. In Framer: Insert → Embed → paste the hosted URL
  3. Set the Embed component size to whatever you like — the sphere fills it.
     Suggested: 280 × 280 px  or  320 × 320 px
  4. The background is transparent, so it sits on any Framer background colour.

  Rendering approach:
  · Real spherical harmonics Y_ℓ^m (ℓ=0–3) evaluated analytically
    in a GLSL fragment shader — one computation per PIXEL, not per vertex.
    This gives mathematically perfect, pixellation-free smooth gradients.
  · Connectivity kernel G_ℓ(σ) = exp(−ℓ(ℓ+1)σ²/2) from neural field theory.
    σ oscillates slowly, cycling between local (spatially rich) and
    global (smooth) coupling regimes — the core WaveComputing narrative.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveComputing</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  background: #000000;
  overflow: hidden;
}
canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Renderer setup ─────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 3));
renderer.setClearColor(0x000000, 1);   // solid black background

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
camera.position.z = 4.6;

// ── Vertex shader ──────────────────────────────────────────────────────────
// Passes the model-space normal (= position on unit sphere) for SH evaluation,
// and the view-space normal for the rim/corona effect.
const vertShader = /* glsl */`
  varying vec3 vN;   // model-space normal → unit sphere coordinate
  varying vec3 vVN;  // view-space normal  → rim darkening / glow

  void main() {
    vN  = normalize(normal);
    vVN = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// ── Fragment shader ────────────────────────────────────────────────────────
// Computes the full ℓ=0..3 spherical harmonic field per fragment,
// weighted by the neural-field connectivity kernel G_ℓ(σ).
// Each mode oscillates at its natural frequency ω_ℓ = √(ℓ(ℓ+1)) · base.
const fragShader = /* glsl */`
  precision highp float;
  varying vec3 vN;
  varying vec3 vVN;
  uniform float u_t;   // time (seconds)

  // ── Colormap ─────────────────────────────────────────────────────────────
  // Diverging: deep midnight blue (inhibition/sink)
  //            → near-black at zero
  //            → rich golden-amber (excitation/source)
  vec3 cmap(float t) {
    t = clamp(t, -1.0, 1.0);
    if (t < 0.0) {
      float s = pow(-t, 0.80);
      return vec3(s*0.02, s*0.08, s*0.72 + s*s*0.18);
    }
    if (t < 0.38) {
      float u = t / 0.38;
      return vec3(u*0.42, u*0.18, u*0.02);
    }
    if (t < 0.72) {
      float u = (t - 0.38) / 0.34;
      return vec3(0.42 + u*0.46, 0.18 + u*0.50, 0.02 + u*0.02);
    }
    float u = (t - 0.72) / 0.28;
    return vec3(0.88 + u*0.12, 0.68 + u*0.26, 0.04 + u*0.12);
  }

  void main() {
    vec3  n = normalize(vN);
    float x = n.x, y = n.y, z = n.z;

    // Connectivity kernel (neural field theory: mode ℓ is suppressed by exp(−ℓ(ℓ+1)σ²/2))
    // σ drifts slowly between ≈0.26 (local → rich spatial structure) and
    //   ≈0.74 (global → smooth low-ℓ waves).  Period ≈ 76 s.
    float sigma = 0.50 + 0.24 * sin(u_t * 0.0828);
    float g0 = 1.0;
    float g1 = exp(-1.0 * sigma * sigma);           // ℓ=1: exp(−2·σ²/2)
    float g2 = exp(-3.0 * sigma * sigma);           // ℓ=2: exp(−6·σ²/2)
    float g3 = exp(-6.0 * sigma * sigma);           // ℓ=3: exp(−12·σ²/2)

    // Natural frequencies: ω_ℓ = base · √(ℓ(ℓ+1))
    float base = 0.195;
    float w1 = base * 1.4142;   // √2
    float w2 = base * 2.4495;   // √6
    float w3 = base * 3.4641;   // √12

    // ── Mode amplitudes (oscillating with dispersion) ────────────────────
    // ℓ=0 — global synchrony mode (slow drift)
    float a00 = 0.88 * cos(0.11 * u_t + 0.72);

    // ℓ=1 — three dipolar modes
    float a1m = 0.76 * cos(w1*u_t + 1.38);
    float a10 = 0.69 * cos(w1*u_t + 2.51);
    float a1p = 0.82 * cos(w1*u_t + 0.18);

    // ℓ=2 — five quadrupolar modes
    float a2mm = 0.58 * cos(w2*u_t + 3.14);
    float a2m  = 0.65 * cos(w2*u_t + 0.93);
    float a20  = 0.72 * cos(w2*u_t + 1.87);
    float a2p  = 0.60 * cos(w2*u_t + 4.21);
    float a2pp = 0.63 * cos(w2*u_t + 2.76);

    // ℓ=3 — seven octupolar modes
    float a3a = 0.43 * cos(w3*u_t + 0.44);
    float a3b = 0.39 * cos(w3*u_t + 5.18);
    float a3c = 0.46 * cos(w3*u_t + 1.62);
    float a3d = 0.52 * cos(w3*u_t + 3.89);
    float a3e = 0.45 * cos(w3*u_t + 0.28);
    float a3f = 0.41 * cos(w3*u_t + 4.67);
    float a3g = 0.44 * cos(w3*u_t + 2.13);

    // ── Real spherical harmonics Y_ℓ^m (analytic, normalised) ───────────
    float Y00   = 0.28209;
    float Y1m1  = 0.48860 * y;
    float Y10   = 0.48860 * z;
    float Y11   = 0.48860 * x;
    float Y2m2  = 1.09255 * x * y;
    float Y2m1  = 1.09255 * y * z;
    float Y20   = 0.31539 * (3.0*z*z - 1.0);
    float Y21   = 1.09255 * x * z;
    float Y22   = 0.54627 * (x*x - y*y);
    float Y3m3  = 0.59004 * y * (3.0*x*x - y*y);
    float Y3m2  = 2.89061 * x * y * z;
    float Y3m1  = 0.45705 * y * (5.0*z*z - 1.0);
    float Y30   = 0.37318 * z * (5.0*z*z - 3.0);
    float Y31   = 0.45705 * x * (5.0*z*z - 1.0);
    float Y32   = 1.44530 * z * (x*x - y*y);
    float Y33   = 0.59004 * x * (x*x - 3.0*y*y);

    // ── Field value F(n, t) ───────────────────────────────────────────────
    float F =   g0 * a00 * Y00
              + g1 * (a1m*Y1m1 + a10*Y10 + a1p*Y11)
              + g2 * (a2mm*Y2m2 + a2m*Y2m1 + a20*Y20 + a2p*Y21 + a2pp*Y22)
              + g3 * (a3a*Y3m3  + a3b*Y3m2 + a3c*Y3m1 + a3d*Y30
                    + a3e*Y31   + a3f*Y32   + a3g*Y33);

    // Soft normalisation (keeps field in roughly [−1, 1])
    F = clamp(F * 2.75, -1.0, 1.0);

    // ── Surface colour ────────────────────────────────────────────────────
    vec3 col = cmap(F);

    // Subtle sphere curvature shading — very soft, keeps the sci-fi look
    float diffuse = 0.88 + 0.12 * clamp(dot(n, normalize(vec3(0.5, 0.8, 1.0))), 0.0, 1.0);
    col *= diffuse;

    // Rim corona — warm gold-amber glow at the limb
    float rim = 1.0 - abs(vVN.z);
    rim = pow(rim, 2.6);
    col += rim * vec3(0.28, 0.12, 0.01);

    // Very slight vignette darkening at extreme limb (depth cue)
    float vign = pow(1.0 - clamp(rim * 0.5, 0.0, 1.0), 1.8);
    col *= (0.84 + 0.16 * vign);

    gl_FragColor = vec4(col, 1.0);
  }
`;

// ── Sphere — high-res for clean silhouette, smooth via shader ─────────────
const mat = new THREE.ShaderMaterial({
  vertexShader:   vertShader,
  fragmentShader: fragShader,
  uniforms: { u_t: { value: 0.0 } },
});
const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.52, 160, 160),   // 160×160 for silhouette fidelity
  mat
);
scene.add(sphere);

// ── Atmospheric corona (outer glow sphere, BackSide + additive) ───────────
const coronaMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: /* glsl */`
    varying vec3 vVN;
    void main() {
      vVN = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision mediump float;
    varying vec3 vVN;
    void main() {
      float rim = 1.0 - abs(vVN.z);
      float alpha = pow(rim, 2.2) * 0.42;
      // Deep blue atmospheric corona — cold side of palette
      gl_FragColor = vec4(0.02, 0.06, 0.55, alpha);
    }
  `,
  transparent: true,
  blending:    THREE.AdditiveBlending,
  side:        THREE.BackSide,
  depthWrite:  false,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.74, 48, 48), coronaMat));

// Second, softer outer halo
const haloMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: /* glsl */`
    varying vec3 vVN;
    void main() {
      vVN = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    precision mediump float;
    varying vec3 vVN;
    void main() {
      float rim = 1.0 - abs(vVN.z);
      float alpha = pow(rim, 1.5) * 0.14;
      gl_FragColor = vec4(0.01, 0.03, 0.36, alpha);
    }
  `,
  transparent: true,
  blending:    THREE.AdditiveBlending,
  side:        THREE.BackSide,
  depthWrite:  false,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(2.10, 32, 32), haloMat));

// ── Resize handler ────────────────────────────────────────────────────────
function onResize() {
  const W = window.innerWidth  || 300;
  const H = window.innerHeight || 300;
  renderer.setSize(W, H, false);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── Animation loop ────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;                         // ≈60 fps target
  mat.uniforms.u_t.value = t;

  // Slow, continuous rotation — feels alive, never repeats obviously
  sphere.rotation.y += 0.0016;
  sphere.rotation.x  = 0.14 + 0.04 * Math.sin(t * 0.031);  // very gentle bob

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
