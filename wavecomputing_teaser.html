// ── SECTION 3: STARFIELD ────────────────────────────────────────────────────
(function buildStars() {
  const N = 1800, pos = new Float32Array(N*3), col = new Float32Array(N*3);
  for (let i = 0; i < N; i++) {
    const theta = Math.random() * 2 * Math.PI;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 55 + Math.random() * 40;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    col[i*3]   = 0.52 + Math.random() * 0.38;
    col[i*3+1] = 0.54 + Math.random() * 0.36;
    col[i*3+2] = 0.62 + Math.random() * 0.38;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    vertexColors: true, size: 0.055, transparent: true, opacity: 0.60, sizeAttenuation: true,
  })));
})();

// ── SECTION 4: VERTEX SHADER ────────────────────────────────────────────────
const vertShader = /* glsl */`
  varying vec3 vN;
  varying vec3 vVN;
  void main() {
    vN  = normalize(normal);
    vVN = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// ── SECTION 5: FRAGMENT SHADER ──────────────────────────────────────────────
// Per pixel: evaluate 81 real spherical harmonics Y_l^m (l=0..8),
// weight by kernel g_l(σ) and time-varying amplitude a_lm(t), sum to F,
// then map through cmap(); apply directional shading, rim glow, limb darkening.
// Seamless loop: every ω_l is integer multiple of w_base=0.1 → reset at T_LOOP=20π.
const fragShader = /* glsl */`
  precision highp float;
  varying vec3  vN;
  varying vec3  vVN;
  uniform float u_t;

  vec3 cmap(float t) {
    t = clamp(t, -1.0, 1.0);
    if (t < 0.0) {
      float s = pow(-t, 0.62);
      return vec3(s*0.01, s*0.04, s*0.70);
    }
    if (t < 0.30) {
      float u = pow(t/0.30, 1.8);
      return vec3(u*0.34, u*0.11, u*0.01);
    }
    if (t < 0.64) {
      float u = (t - 0.30) / 0.34;
      return vec3(0.34 + u*0.52, 0.11 + u*0.54, 0.01);
    }
    float u = (t - 0.64) / 0.36;
    return vec3(0.86 + u*0.14, 0.65 + u*0.31, 0.01 + u*0.15);
  }

  void main() {
    vec3  n = normalize(vN);
    float x = n.x,  y = n.y,  z = n.z;

    // Precomputed powers
    float z2 = z*z;
    float z3 = z2*z;
    float z4 = z2*z2;
    float z5 = z4*z;
    float z6 = z4*z2;
    float z8 = z4*z4;
    float x2 = x*x;
    float y2 = y*y;
    float xy = x*y;
    float x2y2 = x2*y2;
    float x2_m_y2 = x2 - y2;
    float x4 = x2*x2;
    float y4 = y2*y2;
    float x6 = x4*x2;
    float y6 = y4*y2;
    float x8 = x4*x4;
    float y8 = y4*y4;

    // ── CONNECTIVITY KERNEL σ(t) — slow→complex→slow over one cycle ─────────
    // σ ∈ [0.15, 0.80]; σ_max at t=0 (slow), σ_min at t=T_LOOP/2 (complex).
    // Large σ → only low-l modes survive → low effective dimensionality.
    // Small σ → all 81 modes coexist     → rich multi-scale interference.
    float sigma = 0.475 + 0.325 * cos(u_t * 0.1);
    float s2    = sigma * sigma;

    // g_l = exp(−l(l+1)/2 · σ²) — half the Laplace–Beltrami eigenvalue.
    float g0 = 1.0;
    float g1 = exp(-1.0  * s2);
    float g2 = exp(-3.0  * s2);
    float g3 = exp(-6.0  * s2);
    float g4 = exp(-10.0 * s2);
    float g5 = exp(-15.0 * s2);
    float g6 = exp(-21.0 * s2);
    float g7 = exp(-28.0 * s2);
    float g8 = exp(-36.0 * s2);

    // ── FREQUENCIES — ω ∝ √(l(l+1)) ─────────────────────────────────────────
    // n_l = nearest integer to (n_1/√2)·√(l(l+1)); all integer×w_base=0.1.
    float w0 = 0.2;
    float w1 = 0.4;
    float w2 = 0.7;
    float w3 = 1.0;
    float w4 = 1.3;
    float w5 = 1.5;
    float w6 = 1.8;
    float w7 = 2.1;
    float w8 = 2.4;

    // ── TIME-VARYING AMPLITUDES  a_lm(t) = A·cos(ω_l·t + φ_lm) ──────────────

    // l=0 (1 mode)
    float a00  = 0.80 * cos(w0*u_t + 0.72);

    // l=1 (3 modes)
    float a1m  = 0.70 * cos(w1*u_t + 1.38);
    float a10  = 0.65 * cos(w1*u_t + 2.51);
    float a1p  = 0.75 * cos(w1*u_t + 0.18);

    // l=2 (5 modes)
    float a2mm = 0.62 * cos(w2*u_t + 3.14);
    float a2m  = 0.68 * cos(w2*u_t + 0.93);
    float a20  = 0.72 * cos(w2*u_t + 1.87);
    float a2p  = 0.64 * cos(w2*u_t + 4.21);
    float a2pp = 0.66 * cos(w2*u_t + 2.76);

    // l=3 (7 modes)
    float a3a  = 0.52 * cos(w3*u_t + 0.44);
    float a3b  = 0.48 * cos(w3*u_t + 5.18);
    float a3c  = 0.54 * cos(w3*u_t + 1.62);
    float a3d  = 0.56 * cos(w3*u_t + 3.89);
    float a3e  = 0.50 * cos(w3*u_t + 0.28);
    float a3f  = 0.47 * cos(w3*u_t + 4.67);
    float a3g  = 0.53 * cos(w3*u_t + 2.13);

    // l=4 (9 modes)

    float a4b  = 0.44 * cos(w4*u_t + 2.33);
    float a4c  = 0.38 * cos(w4*u_t + 4.71);
    float a4d  = 0.46 * cos(w4*u_t + 0.87);
    float a4e  = 0.42 * cos(w4*u_t + 3.60);
    float a4f  = 0.39 * cos(w4*u_t + 1.92);
    float a4g  = 0.45 * cos(w4*u_t + 5.50);
    float a4h  = 0.41 * cos(w4*u_t + 2.78);
    float a4i  = 0.43 * cos(w4*u_t + 0.33);

    // l=5 (11 modes)
    float a5a  = 0.35 * cos(w5*u_t + 0.71);
    float a5b  = 0.33 * cos(w5*u_t + 2.94);
    float a5c  = 0.36 * cos(w5*u_t + 1.15);
    float a5d  = 0.34 * cos(w5*u_t + 4.37);
    float a5e  = 0.38 * cos(w5*u_t + 0.52);
    float a5f  = 0.37 * cos(w5*u_t + 3.20);
    float a5g  = 0.36 * cos(w5*u_t + 1.68);
    float a5h  = 0.32 * cos(w5*u_t + 5.04);
    float a5i  = 0.35 * cos(w5*u_t + 2.41);
    float a5j  = 0.33 * cos(w5*u_t + 0.89);
    float a5k  = 0.36 * cos(w5*u_t + 3.57);

    // l=6 (13 modes)
    float a6a  = 0.27 * cos(w6*u_t + 1.33);
    float a6b  = 0.29 * cos(w6*u_t + 4.16);
    float a6c  = 0.26 * cos(w6*u_t + 0.74);
    float a6d  = 0.30 * cos(w6*u_t + 2.58);
    float a6e  = 0.28 * cos(w6*u_t + 5.39);

    float a6g  = 0.29 * cos(w6*u_t + 3.82);
    float a6h  = 0.27 * cos(w6*u_t + 0.45);
    float a6i  = 0.30 * cos(w6*u_t + 2.19);
    float a6j  = 0.26 * cos(w6*u_t + 4.93);
    float a6k  = 0.28 * cos(w6*u_t + 1.61);
    float a6l  = 0.29 * cos(w6*u_t + 3.27);
    float a6m  = 0.27 * cos(w6*u_t + 0.95);

    // l=7 (15 modes) — NEW in v5
    float a7a  = 0.22 * cos(w7*u_t + 0.41);
    float a7b  = 0.20 * cos(w7*u_t + 2.18);
    float a7c  = 0.24 * cos(w7*u_t + 4.92);
    float a7d  = 0.21 * cos(w7*u_t + 1.07);
    float a7e  = 0.25 * cos(w7*u_t + 3.65);
    float a7f  = 0.23 * cos(w7*u_t + 0.89);
    float a7g  = 0.22 * cos(w7*u_t + 5.13);
    float a7h  = 0.24 * cos(w7*u_t + 2.46);
    float a7i  = 0.21 * cos(w7*u_t + 4.28);
    float a7j  = 0.20 * cos(w7*u_t + 1.74);
    float a7k  = 0.23 * cos(w7*u_t + 3.09);
    float a7l  = 0.25 * cos(w7*u_t + 5.47);
    float a7m  = 0.22 * cos(w7*u_t + 0.62);
    float a7n  = 0.21 * cos(w7*u_t + 2.81);
    float a7o  = 0.24 * cos(w7*u_t + 4.55);

    // l=8 (17 modes) — NEW in v5
    float a8a  = 0.18 * cos(w8*u_t + 1.92);
    float a8b  = 0.20 * cos(w8*u_t + 5.31);
    float a8c  = 0.17 * cos(w8*u_t + 0.78);
    float a8d  = 0.21 * cos(w8*u_t + 3.46);
    float a8e  = 0.19 * cos(w8*u_t + 2.05);
    float a8f  = 0.22 * cos(w8*u_t + 4.83);
    float a8g  = 0.18 * cos(w8*u_t + 1.27);
    float a8h  = 0.21 * cos(w8*u_t + 3.92);
    float a8i  = 0.20 * cos(w8*u_t + 0.34);
    float a8j  = 0.17 * cos(w8*u_t + 5.79);
    float a8k  = 0.19 * cos(w8*u_t + 2.61);
    float a8l  = 0.22 * cos(w8*u_t + 4.17);
    float a8m  = 0.18 * cos(w8*u_t + 0.95);
    float a8n  = 0.21 * cos(w8*u_t + 3.58);
    float a8o  = 0.19 * cos(w8*u_t + 1.49);
    float a8p  = 0.20 * cos(w8*u_t + 5.04);
    float a8q  = 0.18 * cos(w8*u_t + 2.32);

    // ── REAL SPHERICAL HARMONICS  Y_l^m(x,y,z) ──────────────────────────────
    // Cartesian polynomial forms on unit sphere; ∫|Y_l^m|²dΩ = 1.

    // l=0
    float Y00  = 0.28209;

    // l=1
    float Y1m1 = 0.48860 * y;
    float Y10  = 0.48860 * z;
    float Y11  = 0.48860 * x;

    // l=2
    float Y2m2 = 1.09255 * xy;
    float Y2m1 = 1.09255 * y*z;
    float Y20  = 0.31539 * (3.0*z2 - 1.0);
    float Y21  = 1.09255 * x*z;
    float Y22  = 0.54627 * x2_m_y2;

    // l=3
    float Y3m3 = 0.59004 * y*(3.0*x2 - y2);
    float Y3m2 = 2.89061 * xy*z;
    float Y3m1 = 0.45705 * y*(5.0*z2 - 1.0);
    float Y30  = 0.37318 * z*(5.0*z2 - 3.0);
    float Y31  = 0.45705 * x*(5.0*z2 - 1.0);
    float Y32  = 1.44530 * z*x2_m_y2;
    float Y33  = 0.59004 * x*(x2 - 3.0*y2);

    // l=4
    float Y4m4 = 2.50334 * xy*x2_m_y2;
    float Y4m3 = 1.77013 * y*z*(3.0*x2 - y2);
    float Y4m2 = 0.94617 * xy*(7.0*z2 - 1.0);
    float Y4m1 = 0.66905 * y*z*(7.0*z2 - 3.0);
    float Y40  = 0.10579 * (35.0*z4 - 30.0*z2 + 3.0);
    float Y41  = 0.66905 * x*z*(7.0*z2 - 3.0);
    float Y42  = 0.47309 * x2_m_y2*(7.0*z2 - 1.0);
    float Y43  = 1.77013 * x*z*(x2 - 3.0*y2);
    float Y44  = 0.62584 * (x4 - 6.0*x2y2 + y4);

    // l=5
    float Y5m5 = 0.65669 * y*(5.0*x4 - 10.0*x2y2 + y4);
    float Y55  = 0.65669 * x*(x4 - 10.0*x2y2 + 5.0*y4);
    float Y5m4 = 8.3068  * xy*x2_m_y2*z;
    float Y54  = 2.0767  * z*(x4 - 6.0*x2y2 + y4);
    float Y5m3 = 0.48927 * y*(3.0*x2 - y2)*(9.0*z2 - 1.0);
    float Y53  = 0.48927 * x*(x2 - 3.0*y2)*(9.0*z2 - 1.0);
    float Y5m2 = 4.7932  * xy*z*(3.0*z2 - 1.0);
    float Y52  = 2.3966  * z*x2_m_y2*(3.0*z2 - 1.0);
    float Y5m1 = 0.45315 * y*(21.0*z4 - 14.0*z2 + 1.0);
    float Y51  = 0.45315 * x*(21.0*z4 - 14.0*z2 + 1.0);
    float Y50  = 0.11695 * z*(63.0*z4 - 70.0*z2 + 15.0);

    // l=6
    float Y6m6 = 1.36644 * xy*(3.0*x4 - 10.0*x2y2 + 3.0*y4);
    float Y66  = 0.68322 * (x6 - 15.0*x4*y2 + 15.0*x2*y4 - y6);
    float Y6m5 = 2.3671  * y*z*(5.0*x4 - 10.0*x2y2 + y4);
    float Y65  = 2.3671  * x*z*(x4 - 10.0*x2y2 + 5.0*y4);
    float Y6m4 = 2.01868 * xy*x2_m_y2*(11.0*z2 - 1.0);
    float Y64  = 0.50467 * (11.0*z2 - 1.0)*(x4 - 6.0*x2y2 + y4);
    float Y6m3 = 0.92174 * y*z*(3.0*x2 - y2)*(11.0*z2 - 3.0);
    float Y63  = 0.92174 * x*z*(x2 - 3.0*y2)*(11.0*z2 - 3.0);
    float Y6m2 = 0.92130 * xy*(33.0*z4 - 18.0*z2 + 1.0);
    float Y62  = 0.46065 * x2_m_y2*(33.0*z4 - 18.0*z2 + 1.0);
    float Y6m1 = 0.58262 * y*z*(33.0*z4 - 30.0*z2 + 5.0);
    float Y61  = 0.58262 * x*z*(33.0*z4 - 30.0*z2 + 5.0);
    float Y60  = 0.063571 * (231.0*z6 - 315.0*z4 + 105.0*z2 - 5.0);

    // l=7 — NEW in v5
    float Y7m7 = 0.70713 * y * (7.0*x6 - 35.0*x4*y2 + 21.0*x2*y4 - y6);
    float Y77  = 0.70713 * x * (x6 - 21.0*x4*y2 + 35.0*x2*y4 - 7.0*y6);
    float Y7m6 = 5.2918  * xy * z * (3.0*x4 - 10.0*x2y2 + 3.0*y4);
    float Y76  = 2.6459  * z * (x6 - 15.0*x4*y2 + 15.0*x2*y4 - y6);
    float Y7m5 = 0.51894 * y * (5.0*x4 - 10.0*x2y2 + y4) * (13.0*z2 - 1.0);
    float Y75  = 0.51894 * x * (x4 - 10.0*x2y2 + 5.0*y4) * (13.0*z2 - 1.0);
    float Y7m4 = 4.1516  * xy * x2_m_y2 * z * (13.0*z2 - 3.0);
    float Y74  = 1.0379  * z * (13.0*z2 - 3.0) * (x4 - 6.0*x2y2 + y4);
    float Y7m3 = 0.15644 * y * (3.0*x2 - y2) * (143.0*z4 - 66.0*z2 + 3.0);
    float Y73  = 0.15644 * x * (x2 - 3.0*y2) * (143.0*z4 - 66.0*z2 + 3.0);
    float Y7m2 = 0.44256 * xy * z * (143.0*z4 - 110.0*z2 + 15.0);
    float Y72  = 0.22128 * x2_m_y2 * z * (143.0*z4 - 110.0*z2 + 15.0);
    float Y7m1 = 0.09033 * y * (429.0*z6 - 495.0*z4 + 135.0*z2 - 5.0);
    float Y71  = 0.09033 * x * (429.0*z6 - 495.0*z4 + 135.0*z2 - 5.0);
    float Y70  = 0.06828 * z * (429.0*z6 - 693.0*z4 + 315.0*z2 - 35.0);

    // l=8 — NEW in v5 (finest spatial scale)
    float Y8m8 = 5.8316  * xy * (x6 - 7.0*x4*y2 + 7.0*x2*y4 - y6);
    float Y88  = 0.72895 * (x8 - 28.0*x6*y2 + 70.0*x4*y4 - 28.0*x2*y6 + y8);
    float Y8m7 = 2.9159  * z * y * (7.0*x6 - 35.0*x4*y2 + 21.0*x2*y4 - y6);
    float Y87  = 2.9159  * z * x * (x6 - 21.0*x4*y2 + 35.0*x2*y4 - 7.0*y6);
    float Y8m6 = 1.0648  * xy * (3.0*x4 - 10.0*x2y2 + 3.0*y4) * (15.0*z2 - 1.0);
    float Y86  = 0.5324  * (x6 - 15.0*x4*y2 + 15.0*x2*y4 - y6) * (15.0*z2 - 1.0);
    float Y8m5 = 3.4495  * y * (5.0*x4 - 10.0*x2y2 + y4) * z * (5.0*z2 - 1.0);
    float Y85  = 3.4495  * x * (x4 - 10.0*x2y2 + 5.0*y4) * z * (5.0*z2 - 1.0);
    float Y8m4 = 1.91408 * xy * x2_m_y2 * (65.0*z4 - 26.0*z2 + 1.0);
    float Y84  = 0.47852 * (x4 - 6.0*x2y2 + y4) * (65.0*z4 - 26.0*z2 + 1.0);
    float Y8m3 = 1.2350  * y * (3.0*x2 - y2) * z * (39.0*z4 - 26.0*z2 + 3.0);
    float Y83  = 1.2350  * x * (x2 - 3.0*y2) * z * (39.0*z4 - 26.0*z2 + 3.0);
    float Y8m2 = 0.91216 * xy * (143.0*z6 - 143.0*z4 + 33.0*z2 - 1.0);
    float Y82  = 0.45608 * x2_m_y2 * (143.0*z6 - 143.0*z4 + 33.0*z2 - 1.0);
    float Y8m1 = 0.01211 * y * z * (6435.0*z6 - 9009.0*z4 + 3465.0*z2 - 315.0);
    float Y81  = 0.01211 * x * z * (6435.0*z6 - 9009.0*z4 + 3465.0*z2 - 315.0);
    float Y80  = 0.009087 * (6435.0*z8 - 12012.0*z6 + 6930.0*z4 - 1260.0*z2 + 35.0);

    // ── NEURAL FIELD SUM  F = Σ_l g_l Σ_m a_lm(t) Y_l^m(x,y,z) ──────────────
    float F =
      g0 * a00 * Y00
      + g1 * (a1m*Y1m1 + a10*Y10 + a1p*Y11)
      + g2 * (a2mm*Y2m2 + a2m*Y2m1 + a20*Y20 + a2p*Y21 + a2pp*Y22)
      + g3 * (a3a*Y3m3 + a3b*Y3m2 + a3c*Y3m1 + a3d*Y30
            + a3e*Y31  + a3f*Y32  + a3g*Y33)
      + g4 * (a4a*Y4m4 + a4b*Y4m3 + a4c*Y4m2 + a4d*Y4m1 + a4e*Y40
            + a4f*Y41  + a4g*Y42  + a4h*Y43  + a4i*Y44)
      + g5 * (a5a*Y5m5 + a5b*Y5m4 + a5c*Y5m3 + a5d*Y5m2 + a5e*Y5m1
            + a5f*Y50
            + a5g*Y51  + a5h*Y52  + a5i*Y53  + a5j*Y54  + a5k*Y55)
      + g6 * (a6a*Y6m6 + a6b*Y6m5 + a6c*Y6m4 + a6d*Y6m3 + a6e*Y6m2
            + a6f*Y6m1
            + a6g*Y60
            + a6h*Y61  + a6i*Y62  + a6j*Y63  + a6k*Y64  + a6l*Y65
            + a6m*Y66)
      + g7 * (a7a*Y7m7 + a7b*Y7m6 + a7c*Y7m5 + a7d*Y7m4 + a7e*Y7m3
            + a7f*Y7m2 + a7g*Y7m1
            + a7h*Y70
            + a7i*Y71  + a7j*Y72  + a7k*Y73  + a7l*Y74  + a7m*Y75
            + a7n*Y76  + a7o*Y77)
      + g8 * (a8a*Y8m8 + a8b*Y8m7 + a8c*Y8m6 + a8d*Y8m5 + a8e*Y8m4
            + a8f*Y8m3 + a8g*Y8m2 + a8h*Y8m1
            + a8i*Y80
            + a8j*Y81  + a8k*Y82  + a8l*Y83  + a8m*Y84  + a8n*Y85
            + a8o*Y86  + a8p*Y87  + a8q*Y88);

    // Scale to fill [−1,+1] for the colour map. 2.8 → 2.4 in v5.
    F = clamp(F * 2.4, -1.0, 1.0);

    vec3 col = cmap(F);

    // Subtle directional shading
    float diff = 0.93 + 0.07 * clamp(dot(n, normalize(vec3(0.4, 0.7, 1.0))), 0.0, 1.0);
    col *= diff;

    // Warm amber rim glow
    float rimGlow = pow(1.0 - abs(vVN.z), 3.2);
    col += rimGlow * vec3(0.22, 0.09, 0.01);

    // Limb darkening
    float facing = abs(vVN.z);
    float limb   = pow(facing, 0.36);
    col *= (0.18 + 0.82 * limb);

    gl_FragColor = vec4(col, 1.0);
  }
`;

// ── SECTION 6: MAIN SPHERE MESH ─────────────────────────────────────────────
const mat = new THREE.ShaderMaterial({
  vertexShader:   vertShader,
  fragmentShader: fragShader,
  uniforms: { u_t: { value: 0.0 } },
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.52, 160, 160), mat));

// ── SECTION 7: ATMOSPHERIC HALOS ────────────────────────────────────────────
const makeHalo = (radius, power, alpha, r, g, b) => {
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(radius, 48, 48),
    new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vVN;
        void main() {
          vVN = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        precision mediump float;
        varying vec3 vVN;
        void main() {
          float rim = 1.0 - abs(vVN.z);
          float a   = pow(rim, ${power.toFixed(1)}) * ${alpha.toFixed(2)};
          gl_FragColor = vec4(${r.toFixed(2)}, ${g.toFixed(2)}, ${b.toFixed(2)}, a);
        }`,
      transparent: true, blending: THREE.AdditiveBlending,
      side: THREE.BackSide, depthWrite: false,
    })
  ));
};
makeHalo(1.78, 2.5, 0.44, 0.01, 0.04, 0.50);
makeHalo(2.18, 1.5, 0.14, 0.01, 0.02, 0.32);

// ── SECTION 8: RESPONSIVE RESIZE ────────────────────────────────────────────
function onResize() {
  const W = window.innerWidth || 300, H = window.innerHeight || 300;
  renderer.setSize(W, H, false);
  camera.aspect = W / H;
  const halfRad = (camera.aspect >= 1)
    ? Math.atan(FIT_R / CAM_Z)
    : Math.atan(FIT_R / (camera.aspect * CAM_Z));
  camera.fov = 2 * halfRad * (180 / Math.PI);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// ── SECTION 9: ANIMATION LOOP ───────────────────────────────────────────────
// Integer-frame counter for mathematically exact seamless loop.
// N_FRAMES=3600 at 60fps → cycle = 60.0s. Y-rotation: one turn per cycle.
const T_LOOP   = 20.0 * Math.PI;
const N_FRAMES = 3600;
const dt       = T_LOOP / N_FRAMES;

let frame = 0;
const sphereMesh = scene.children.find(c => c.isMesh && c.material === mat);

function animate() {
  requestAnimationFrame(animate);
  frame = (frame + 1) % N_FRAMES;
  const t = frame * dt;
  mat.uniforms.u_t.value = t;
  if (sphereMesh) {
    sphereMesh.rotation.y = t * (2.0 * Math.PI / T_LOOP);
    sphereMesh.rotation.x = 0.14 + 0.05 * Math.sin(t * 0.1);
  }
  renderer.render(scene, camera);
}

animate();
</script>
