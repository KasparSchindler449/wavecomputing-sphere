<html lang="en">
<head>

<style>

/* ── Global reset ────────────────────────────────────────────────────────────
   Strip all default browser margins and padding.

/* ── Full-viewport body ──────────────────────────────────────────────────────
   min-height: 100vh ensures full coverage even on short viewports.

}

<body>
<canvas id="c"></canvas>

<!-- ── Three.js library ───────────────────────────────────────────────────────
     r128 from Cloudflare CDN.  Version r128 is stable and sufficient;
     newer releases have API changes that would require code adjustments.    -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// SECTION 1 — RENDERER
// The WebGLRenderer wraps the <canvas> and manages all GPU communication.
// antialias: true enables hardware MSAA (multi-sample anti-aliasing), which
// smooths the sphere silhouette at no significant GPU cost on modern hardware.
// ═════════════════════════════════════════════════════════════════════════════

const canvas   = document.getElementById('c');

const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true   // MSAA smooths jagged edges on the sphere silhouette
});

// Pixel ratio: on HiDPI / Retina displays, devicePixelRatio can be 2 or 3.
// We cap at 2.5 — looks crisp on most retina screens without the extreme
// GPU cost of rendering at 3× resolution on large iPad Pro displays.
renderer.setPixelRatio(Math.min(devicePixelRatio, 2.5));

// The clear colour is the colour drawn behind everything else.
// Pure black (0x000000) is essential: the sphere's limb-darkening effect
// dissolves its rim into this background, creating the "floating in space" look.
renderer.setClearColor(0x000000, 1);

// The Three.js scene graph.  All objects (sphere, halos, stars) are added here.
const scene = new THREE.Scene();


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 2 — CAMERA
// PerspectiveCamera mimics a real lens with a field-of-view angle.
// The FOV is NOT fixed here — it is recomputed in onResize() so the sphere
// always fits fully in the frame regardless of viewport shape or aspect ratio.
// ═════════════════════════════════════════════════════════════════════════════

// CAM_Z: camera sits 6.8 world-units along +Z, looking toward the origin.
const CAM_Z = 6.8;

// FIT_R: the "guaranteed visible radius" — the main sphere (r = 1.52) plus
// the outer halo (r ≈ 2.18) plus a small margin.  The dynamic FOV is chosen
// so that a circle of FIT_R world-units always fits inside the smaller
// viewport dimension (width on portrait, height on landscape).
const FIT_R = 2.30;

// Initial values (aspect=1, fov=38) are immediately overwritten by onResize().
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 200);
camera.position.z = CAM_Z;   // place camera along +Z axis, facing origin


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 3 — STARFIELD
// 1800 points scattered uniformly on large spherical shells (r = 55–95 units).
// These never move and serve as a fixed cosmic backdrop.
// Using a BufferGeometry + PointsMaterial is the most GPU-efficient approach
// for large numbers of simple points.
// ═════════════════════════════════════════════════════════════════════════════

(function buildStars() {

  const N   = 1800;                     // number of stars
  const pos = new Float32Array(N * 3);  // xyz for each star (3 floats × N)
  const col = new Float32Array(N * 3);  // rgb for each star (3 floats × N)

  for (let i = 0; i < N; i++) {

    // --- Uniform distribution on a sphere ---
    // Naive uniform sampling of (theta, phi) clusters stars at the poles.
    // The arc-cosine trick (phi = acos(2u - 1)) distributes them uniformly
    // in solid angle, matching the probability element sin(phi) dphi dtheta.
    const theta = Math.random() * 2 * Math.PI;       // azimuthal: [0, 2π]
    const phi   = Math.acos(2 * Math.random() - 1);  // polar:     [0, π]

    // Vary the distance so stars are not all at exactly the same radius —
    // creates a subtle impression of depth among the star field.
    const r = 55 + Math.random() * 40;               // radius: 55–95 units

    // Spherical → Cartesian conversion.
    pos[i*3    ] = r * Math.sin(phi) * Math.cos(theta);  // x
    pos[i*3 + 1] = r * Math.sin(phi) * Math.sin(theta);  // y
    pos[i*3 + 2] = r * Math.cos(phi);                    // z

    // Slight blue-white colour variation mimics stellar colour temperature.
    // Blue channel is highest (0.62–1.00) to give a cold, deep-space feel.
    col[i*3    ] = 0.52 + Math.random() * 0.38;  // R: 0.52–0.90
    col[i*3 + 1] = 0.54 + Math.random() * 0.36;  // G: 0.54–0.90
    col[i*3 + 2] = 0.62 + Math.random() * 0.38;  // B: 0.62–1.00
  }

  // Pack positions and colours into a Three.js BufferGeometry.
  // BufferGeometry stores typed arrays directly on the GPU — very efficient.
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));  // 3 floats / vertex
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));  // 3 floats / vertex

  // PointsMaterial renders each vertex as a fixed-size screen-space disk.
  // vertexColors: true reads per-vertex colours from the buffer above.
  // sizeAttenuation: true makes distant points appear smaller (perspective).
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    vertexColors:    true,
    size:            0.055,  // world-unit diameter — appears tiny at r ≈ 55–95
    transparent:     true,
    opacity:         0.60,   // slightly transparent for a soft, diffuse twinkle
    sizeAttenuation: true,
  })));

})(); // immediately-invoked function keeps star variables out of global scope


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 4 — VERTEX SHADER
//
// The vertex shader runs on the GPU once per vertex of the sphere geometry
// (160×160 subdivisions ≈ 25 600 vertices per frame).  Its job is minimal:
// compute and pass two surface-normal vectors to the fragment shader.
//
// vN  — surface normal in MODEL space (the sphere's own coordinate frame).
//        For a sphere centred at the origin, the outward normal at any point
//        (x, y, z) on the surface IS the position vector itself.  We use
//        this as the argument to the spherical harmonic formulas, because
//        those formulas are defined on the unit sphere.
//
// vVN — surface normal in VIEW space (after the camera's rotation transform).
//        abs(vVN.z) = 1 at the sphere centre as seen by the camera (fully
//        facing us), and = 0 at the silhouette rim.  This drives the
//        limb-darkening and rim-glow effects.
// ═════════════════════════════════════════════════════════════════════════════

const vertShader = /* glsl */`

  varying vec3 vN;    // model-space normal → passed to fragment shader
  varying vec3 vVN;   // view-space  normal → passed to fragment shader

  void main() {

    // normalize() re-normalises after any floating-point drift or interpolation.
    vN  = normalize(normal);                          // model space
    vVN = normalize(normalMatrix * normal);           // view space (camera-relative)

    // Standard MVP transform: map the vertex from model space to clip space.
    // projectionMatrix × modelViewMatrix = Projection × View × Model combined.
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 5 — FRAGMENT SHADER
//
// This is the computational heart of the visualisation.  It runs once per
// PIXEL that the sphere covers on screen (~200 000–500 000 pixels depending
// on resolution and zoom level), and determines the colour of each pixel.
//
// Each pixel corresponds to a point (x, y, z) on the sphere surface.
// The shader:
//   (a) Reads (x,y,z) from vN — this is the surface point in model space.
//   (b) Evaluates all real spherical harmonics Y_l^m at that point, for l=0…4.
//   (c) Weights each mode by the neural-field kernel g_l(σ), which encodes
//       how strongly the cortical connectivity kernel couples that mode.
//   (d) Multiplies by a time-varying amplitude a_lm(t) = cos(w_l·t + φ_lm).
//   (e) Sums all contributions to get F(x,y,z,t) — the instantaneous
//       field value (membrane potential proxy) at this surface point.
//   (f) Maps F through the colour function cmap().
//   (g) Applies directional shading, rim glow, and limb darkening.
//
// ─────────────────────────────────────────────────────────────────────────────
// SPHERICAL HARMONICS  Y_l^m
// ─────────────────────────────────────────────────────────────────────────────
//   These are the eigenfunctions of the Laplace-Beltrami operator on S²,
//   exactly analogous to Fourier modes on a circle.
//   l = degree (controls spatial frequency; l=0 → uniform; l=4 → fine detail)
//   m = order  (orientation of the pattern; −l ≤ m ≤ l)
//   We use the REAL forms (cosine/sine combinations), expressed in Cartesian
//   coordinates (x, y, z) with x² + y² + z² = 1.
//   Normalisation: ∫ |Y_l^m|² dΩ = 1 over the full sphere.
//
// ─────────────────────────────────────────────────────────────────────────────
// NEURAL-FIELD CONNECTIVITY KERNEL  g_l(σ)
// ─────────────────────────────────────────────────────────────────────────────
//   In Robinson-style neural field theory the coupling kernel in spherical
//   harmonic space is a Gaussian:
//       g_l = exp(−c_l · σ²)   with c_l = l(l+1)/2  (approximately)
//   Large σ (broad coupling) → exponential suppresses all l > 0 → only the
//     global l=0 mode survives → whole sphere oscillates in unison (seizure).
//   Small σ (local coupling) → high-l modes survive → rich fine-grained activity.
//   σ oscillates sinusoidally so the visualisation cycles between these states.
//
// ─────────────────────────────────────────────────────────────────────────────
// SEAMLESS LOOP MECHANISM
// ─────────────────────────────────────────────────────────────────────────────
//   All frequencies w_l are INTEGER MULTIPLES of w_base = 0.1:
//     l=0: w=0.2 (n=2),  l=1: w=0.4 (n=4),  l=2: w=0.7 (n=7)
//     l=3: w=1.1 (n=11), l=4: w=1.7 (n=17), σ: w=0.1 (n=1)
//   Loop period: T_loop = 2π / w_base = 20π ≈ 62.83 sim-time units.
//   At t = T_loop: cos(w_l · T_loop + φ) = cos(2π·n + φ) = cos(φ).
//   Every term returns to its EXACT initial value — zero-seam loop.
// ═════════════════════════════════════════════════════════════════════════════

const fragShader = /* glsl */`
  precision highp float;   // maximum float precision — prevents banding in smooth gradients

  varying vec3  vN;    // model-space surface normal (= unit position vector on sphere)
  varying vec3  vVN;   // view-space  surface normal (camera-facing direction)
  uniform float u_t;   // simulation time, incremented by dt each frame in JavaScript


  // ───────────────────────────────────────────────────────────────────────────
  // COLOUR MAP:  F ∈ [−1, +1]  →  RGB
  //
  // Negative F (inhibition) → deep midnight navy
  // F ≈ 0     (resting)     → true black  (power curves keep this dark)
  // Positive F (excitation) → dark copper → rich gold → bright warm amber
  //
  // Why power curves?  Without them, near-zero values map to visible grey,
  // destroying the dramatic black zero-crossing.  pow(u, γ) with γ > 1
  // compresses the bottom of the range, keeping it very dark.
  // ───────────────────────────────────────────────────────────────────────────
  vec3 cmap(float t) {

    t = clamp(t, -1.0, 1.0);   // safety clamp: ensure input stays in valid range

    if (t < 0.0) {
      // ── Inhibitory zone (negative F) ──────────────────────────────────────
      // pow(-t, 0.62) compresses mid-range values, keeping them dark.
      // Exponent < 1 makes even moderate inhibition look deep and moody.
      float s = pow(-t, 0.62);
      return vec3(
        s * 0.01,   // R: almost zero — no redness in inhibitory zones
        s * 0.04,   // G: almost zero — hint of teal in the darkest blues
        s * 0.70    // B: strong blue, the visual signature of inhibition
      );
    }

    if (t < 0.30) {
      // ── Near-zero positive: black → faint dark copper ─────────────────────
      // pow(u, 1.8) with γ > 1 keeps this sub-range very close to black.
      // Goal: the resting state looks black, not grey — maximum drama.
      float u = pow(t / 0.30, 1.8);   // normalise to [0,1] within this segment, then compress
      return vec3(
        u * 0.34,   // R: faint copper glow begins
        u * 0.11,   // G: barely visible
        u * 0.01    // B: near zero — warmth through red dominance
      );
    }

    if (t < 0.64) {
      // ── Medium excitation: dark copper → rich gold ────────────────────────
      float u = (t - 0.30) / 0.34;   // normalise this sub-range to [0, 1]
      return vec3(
        0.34 + u * 0.52,   // R: copper (0.34) → near-white gold (0.86)
        0.11 + u * 0.54,   // G: dark  (0.11) → bright yellow   (0.65)
        0.01               // B: stays near zero — gold has no blue
      );
    }

    // ── Strong excitation: rich gold → luminous warm amber (peak) ────────────
    float u = (t - 0.64) / 0.36;   // normalise final sub-range to [0, 1]
    return vec3(
      0.86 + u * 0.14,   // R: 0.86 → 1.00  (maximum — pure white-hot)
      0.65 + u * 0.31,   // G: gold → straw-yellow
      0.01 + u * 0.15    // B: faint warm tint at peak — avoids cold white
    );
  }


  // ═══════════════════════════════════════════════════════════════════════════
  // MAIN PROGRAM
  // ═══════════════════════════════════════════════════════════════════════════
  void main() {

    // ── Surface point coordinates ────────────────────────────────────────────
    // vN is the outward surface normal in model space.
    // For a sphere centred at origin the outward normal IS the position vector,
    // so (x, y, z) = vN with x² + y² + z² = 1 exactly.
    // These values are passed to every spherical harmonic formula below.
    vec3  n  = normalize(vN);   // re-normalise for floating-point safety
    float x  = n.x;
    float y  = n.y;
    float z  = n.z;

    // Precompute powers of z — they appear repeatedly in l=3 and l=4 formulas.
    // Precomputing avoids redundant multiplications in the GPU ALU.
    float z2 = z * z;           // z²
    float z3 = z2 * z;          // z³   (used in l=3 zonal harmonic)
    float z4 = z2 * z2;         // z⁴   (used in l=4 zonal harmonic)


    // ── NEURAL-FIELD CONNECTIVITY KERNEL  σ(t) ──────────────────────────────
    // σ oscillates with w = 0.1 = 1 × w_base → period = 2π/0.1 = T_loop.
    // One complete σ oscillation per visual loop.
    // Range: σ ∈ [0.26, 0.74]
    //   σ ≈ 0.26 → local coupling → high-l modes survive → complex patterns
    //   σ ≈ 0.74 → broad coupling → only l=0,1 survive → slow global waves
    float sigma = 0.50 + 0.24 * sin(u_t * 0.1);

    // σ² — used in every kernel exponent below; compute once for efficiency.
    float s2 = sigma * sigma;

    // g_l = Gaussian suppression factor for each spatial degree l.
    // g_l = exp(−c_l · σ²),  where c_l ≈ l(l+1)/2 from the eigenvalue spectrum.
    // As σ grows, high-l terms are suppressed first — fine patterns vanish,
    // leaving only the broadest global oscillation (seizure-like state).
    float g0 = 1.0;              // l=0: eigenvalue = 0, never suppressed
    float g1 = exp(-1.0  * s2);  // l=1: eigenvalue = 2,  c ≈ 1
    float g2 = exp(-3.0  * s2);  // l=2: eigenvalue = 6,  c ≈ 3
    float g3 = exp(-6.0  * s2);  // l=3: eigenvalue = 12, c ≈ 6
    float g4 = exp(-10.0 * s2);  // l=4: eigenvalue = 20, c ≈ 10 — most sensitive to σ


    // ── OSCILLATION FREQUENCIES ──────────────────────────────────────────────
    // Each degree l gets a frequency w_l = n_l × w_base, with w_base = 0.1.
    // Integer multipliers n_l are chosen to be coprime with each other where
    // possible, maximising the variety of interference patterns within the loop.
    //
    //  l=0:  n= 2,  w=0.2  — slowest; the global mode changes most gently
    //  l=1:  n= 4,  w=0.4  — dipole waves; moderate speed
    //  l=2:  n= 7,  w=0.7  — quadrupole; clearly faster than l=1
    //  l=3:  n=11,  w=1.1  — fast octupole patterns
    //  l=4:  n=17,  w=1.7  — finest spatial detail oscillates fastest
    //                         (mirrors the dispersion relation ω ∝ √(l(l+1))
    //                          of real cortical neural fields)
    float w0 = 0.2;   // l=0 angular frequency  [rad / sim-unit]
    float w1 = 0.4;   // l=1 angular frequency
    float w2 = 0.7;   // l=2 angular frequency
    float w3 = 1.1;   // l=3 angular frequency
    float w4 = 1.7;   // l=4 angular frequency


    // ── TIME-VARYING MODE AMPLITUDES  a_lm(t) ───────────────────────────────
    // Each mode oscillates independently: a_lm = A_lm · cos(w_l · t + φ_lm).
    // Phase offsets φ_lm are arbitrary (but fixed) constants — they create
    // rich interference variety while leaving the loop structure intact,
    // because cos(w_l · T_loop + φ_lm) = cos(2π·n_l + φ_lm) = cos(φ_lm).
    //
    // Amplitude magnitudes A_lm are tapered slightly with l — higher modes
    // have smaller amplitudes so the fine-detail shimmering complements rather
    // than overwhelms the large-scale pattern structure.

    // l = 0  (1 mode)
    float a00  = 0.80 * cos(w0 * u_t + 0.72);   // m=0 — uniform global wave

    // l = 1  (3 modes: m = -1, 0, +1)
    float a1m  = 0.70 * cos(w1 * u_t + 1.38);   // m=-1: y-oriented dipole
    float a10  = 0.65 * cos(w1 * u_t + 2.51);   // m= 0: z-oriented dipole (north-south)
    float a1p  = 0.75 * cos(w1 * u_t + 0.18);   // m=+1: x-oriented dipole

    // l = 2  (5 modes: m = -2, -1, 0, +1, +2)
    float a2mm = 0.62 * cos(w2 * u_t + 3.14);   // m=-2: xy quadrupole
    float a2m  = 0.68 * cos(w2 * u_t + 0.93);   // m=-1: yz quadrupole
    float a20  = 0.72 * cos(w2 * u_t + 1.87);   // m= 0: zonal (latitude) quadrupole
    float a2p  = 0.64 * cos(w2 * u_t + 4.21);   // m=+1: xz quadrupole
    float a2pp = 0.66 * cos(w2 * u_t + 2.76);   // m=+2: (x²-y²) quadrupole

    // l = 3  (7 modes: m = -3, -2, -1, 0, +1, +2, +3)
    float a3a  = 0.52 * cos(w3 * u_t + 0.44);   // m=-3
    float a3b  = 0.48 * cos(w3 * u_t + 5.18);   // m=-2
    float a3c  = 0.54 * cos(w3 * u_t + 1.62);   // m=-1
    float a3d  = 0.56 * cos(w3 * u_t + 3.89);   // m= 0 (zonal — latitude stripes)
    float a3e  = 0.50 * cos(w3 * u_t + 0.28);   // m=+1
    float a3f  = 0.47 * cos(w3 * u_t + 4.67);   // m=+2
    float a3g  = 0.53 * cos(w3 * u_t + 2.13);   // m=+3

    // l = 4  (9 modes: m = -4, -3, -2, -1, 0, +1, +2, +3, +4)  ← NEW in v2
    // These modes have 4 nodal circles each — the finest spatial structure
    // visually resolvable on a sphere of this size.  They produce the
    // small shimmering blotchy patches that oscillate rapidly.
    float a4a  = 0.40 * cos(w4 * u_t + 1.05);   // m=-4
    float a4b  = 0.44 * cos(w4 * u_t + 2.33);   // m=-3
    float a4c  = 0.38 * cos(w4 * u_t + 4.71);   // m=-2
    float a4d  = 0.46 * cos(w4 * u_t + 0.87);   // m=-1
    float a4e  = 0.42 * cos(w4 * u_t + 3.60);   // m= 0 (zonal — four latitude stripes)
    float a4f  = 0.39 * cos(w4 * u_t + 1.92);   // m=+1
    float a4g  = 0.45 * cos(w4 * u_t + 5.50);   // m=+2
    float a4h  = 0.41 * cos(w4 * u_t + 2.78);   // m=+3
    float a4i  = 0.43 * cos(w4 * u_t + 0.33);   // m=+4


    // ── REAL SPHERICAL HARMONICS  Y_l^m(x, y, z) ────────────────────────────
    // Evaluated analytically in Cartesian coordinates on the unit sphere.
    // These are the spatial patterns — the "shapes" each mode paints on the sphere.
    // Normalisation constants are chosen so that ∫ |Y_l^m|² dΩ = 1 (L² norm = 1).
    // All formulas derived from the standard real spherical harmonic table
    // (see e.g. Blanco et al. 1997, J. Mol. Struct. THEOCHEM 419, 19–27).
    //
    // Notation: c_lm = normalisation constant printed in comments.

    // ── l = 0: 1 mode — uniform DC ──────────────────────────────────────────
    // Y_0^0 = (1/2)√(1/π) ≈ 0.28209
    // This is a constant — the same value at every point on the sphere.
    // When this mode dominates, the whole sphere is one uniform colour.
    float Y00  = 0.28209;                              // c = (1/2)√(1/π)

    // ── l = 1: 3 modes — dipole (one nodal circle each) ─────────────────────
    // Y_1^{-1} ∝ y:  positive in +y hemisphere, negative in −y
    // Y_1^0   ∝ z:  positive in +z hemisphere (north), negative in south
    // Y_1^1   ∝ x:  positive in +x hemisphere, negative in −x
    float Y1m1 = 0.48860 * y;                          // c = (1/2)√(3/π)
    float Y10  = 0.48860 * z;
    float Y11  = 0.48860 * x;

    // ── l = 2: 5 modes — quadrupole (two nodal circles each) ────────────────
    // These produce clover-leaf and figure-8 patterns at various orientations.
    float Y2m2 = 1.09255 * x * y;                      // c = (1/2)√(15/π)
    float Y2m1 = 1.09255 * y * z;
    float Y20  = 0.31539 * (3.0*z2 - 1.0);             // c = (1/4)√(5/π)  · zonal
    float Y21  = 1.09255 * x * z;
    float Y22  = 0.54627 * (x*x - y*y);                // c = (1/4)√(15/π)

    // ── l = 3: 7 modes — octupole (three nodal circles each) ────────────────
    // Produce trefoil, four-lobe, and banded patterns.
    float Y3m3 = 0.59004 * y * (3.0*x*x - y*y);        // c = (1/4)√(35/(2π))
    float Y3m2 = 2.89061 * x * y * z;                  // c = (1/2)√(105/π)
    float Y3m1 = 0.45705 * y * (5.0*z2 - 1.0);         // c = (1/4)√(21/(2π))
    float Y30  = 0.37318 * z * (5.0*z2 - 3.0);         // c = (1/4)√(7/π)  · zonal
    float Y31  = 0.45705 * x * (5.0*z2 - 1.0);
    float Y32  = 1.44530 * z * (x*x - y*y);            // c = (1/4)√(105/π)
    float Y33  = 0.59004 * x * (x*x - 3.0*y*y);        // c = (1/4)√(35/(2π))

    // ── l = 4: 9 modes — 16-pole (four nodal circles each) ── NEW in v2 ─────
    // These produce the finest spatial detail visible on a sphere of this size:
    // small blotchy star-shaped patches, 8-lobe and petal patterns, and four
    // latitude stripes (zonal Y_4^0).
    //
    // Y_4^{-4} ∝ xy(x²−y²)         — 8-lobe star pattern
    // Y_4^{-3} ∝ yz(3x²−y²)        — trefoil × z
    // Y_4^{-2} ∝ xy(7z²−1)          — 4-lobe × latitude envelope
    // Y_4^{-1} ∝ yz(7z²−3)          — petal × latitude
    // Y_4^0   ∝ (35z⁴−30z²+3)      — 4 latitude stripes (zonal)
    // Y_4^{+1} ∝ xz(7z²−3)
    // Y_4^{+2} ∝ (x²−y²)(7z²−1)
    // Y_4^{+3} ∝ xz(x²−3y²)
    // Y_4^{+4} ∝ x⁴−6x²y²+y⁴       — 8-lobe equatorial star
    float Y4m4 = 2.50334 * x * y * (x*x - y*y);               // c from Sloan 2008 SH table
    float Y4m3 = 1.77013 * y * z * (3.0*x*x - y*y);
    float Y4m2 = 0.94617 * x * y * (7.0*z2 - 1.0);
    float Y4m1 = 0.66905 * y * z * (7.0*z2 - 3.0);
    float Y40  = 0.10579 * (35.0*z4 - 30.0*z2 + 3.0);         // zonal; c = 3/(16√π)
    float Y41  = 0.66905 * x * z * (7.0*z2 - 3.0);
    float Y42  = 0.47309 * (x*x - y*y) * (7.0*z2 - 1.0);
    float Y43  = 1.77013 * x * z * (x*x - 3.0*y*y);
    float Y44  = 0.62584 * (x*x*x*x - 6.0*x*x*y*y + y*y*y*y);  // c = 0.62584


    // ── NEURAL FIELD SUM  F(x, y, z, t) ─────────────────────────────────────
    // F = Σ_{l,m}  g_l(σ) · a_lm(t) · Y_l^m(x, y, z)
    //
    // This is the instantaneous value of the simulated cortical potential
    // field at this surface point.  The three factors in each term:
    //   g_l      — how strongly the connectivity kernel couples this mode
    //   a_lm(t)  — time-varying amplitude (oscillating cosine)
    //   Y_l^m    — spatial pattern (fixed shape, rotated / oriented by m)
    //
    // Positive F → excitatory (gold/amber); negative F → inhibitory (blue).
    float F =
      // l=0 — global uniform oscillation
      g0 *  a00 * Y00

      // l=1 — three dipole modes
      + g1 * ( a1m * Y1m1
             + a10 * Y10
             + a1p * Y11 )

      // l=2 — five quadrupole modes
      + g2 * ( a2mm * Y2m2
             + a2m  * Y2m1
             + a20  * Y20
             + a2p  * Y21
             + a2pp * Y22 )

      // l=3 — seven octupole modes
      + g3 * ( a3a * Y3m3
             + a3b * Y3m2
             + a3c * Y3m1
             + a3d * Y30
             + a3e * Y31
             + a3f * Y32
             + a3g * Y33 )

      // l=4 — nine 16-pole modes  (NEW in v2)
      + g4 * ( a4a * Y4m4
             + a4b * Y4m3
             + a4c * Y4m2
             + a4d * Y4m1
             + a4e * Y40
             + a4f * Y41
             + a4g * Y42
             + a4h * Y43
             + a4i * Y44 );

    // Scale F to fill roughly [−1, +1] after the sum.
    // The factor 3.0 is empirically tuned: too small → pale washed-out colours;
    // too large → over-saturated with harsh clipping; 3.0 gives vivid colour
    // while preserving smooth gradients near the zero crossings.
    F = clamp(F * 3.0, -1.0, 1.0);

    // Map the field value to a colour through the colour function above.
    vec3 col = cmap(F);


    // ── SUBTLE DIRECTIONAL SHADING ────────────────────────────────────────────
    // A very gentle diffuse light from upper-right reinforces the sense of
    // a 3-D sphere without competing with the eigenmode colour map.
    // diff stays in [0.93, 1.00] — only a 7% variation, barely perceptible.
    float diff = 0.93 + 0.07 * clamp(
      dot(n, normalize(vec3(0.4, 0.7, 1.0))),   // dot product with light direction
      0.0, 1.0
    );
    col *= diff;   // modulate colour by shading factor


    // ── WARM RIM GLOW ─────────────────────────────────────────────────────────
    // At the extreme silhouette edge of the sphere, abs(vVN.z) → 0.
    // We add a warm amber-copper glow at this rim, mimicking the atmospheric
    // scattering seen on planets lit from behind.
    // pow(..., 3.2) makes the glow a narrow ring — 3.2 is tight enough to
    // be visible as a distinct ring without spreading into the sphere interior.
    float rimGlow = pow(1.0 - abs(vVN.z), 3.2);
    col += rimGlow * vec3(0.22, 0.09, 0.01);   // warm amber tint at the rim edge


    // ── LIMB DARKENING ────────────────────────────────────────────────────────
    // abs(vVN.z) = 1 at the sphere's centre (directly facing the camera),
    //           = 0 at the extreme silhouette edge (tangent to camera).
    // We darken the edge strongly so the sphere dissolves into the black
    // background at its rim.  This is the key trick that makes it look
    // like it is truly floating in space rather than painted on a black disk.
    //
    // pow(facing, 0.36): slow falloff — most of the sphere stays near-full
    // brightness, only the last ~15% of radius dims rapidly to 18%.
    // The 0.18 floor ensures the edge doesn't go completely black (which
    // would look like a hard cutout) but instead fades naturally.
    float facing = abs(vVN.z);                // 1.0 = centre, 0.0 = rim
    float limb   = pow(facing, 0.36);         // slow-roll dimming toward rim
    col *= (0.18 + 0.82 * limb);             // rim reaches 18% of centre brightness

    // Output the final pixel colour.  Alpha = 1.0 (fully opaque).
    gl_FragColor = vec4(col, 1.0);
  }
`;


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 6 — MAIN SPHERE MESH
//
// SphereGeometry(radius, widthSegments, heightSegments):
//   radius = 1.52  — slightly larger than 1.0 for visual weight.
//   160×160 — high tessellation for a smooth curved silhouette; any fewer and
//              faceting is visible on the outline at high resolution screens.
//
// ShaderMaterial: uses our custom vertex + fragment shaders.
//   uniforms.u_t — the only CPU→GPU data transfer each frame (a single float).
// ═════════════════════════════════════════════════════════════════════════════

const mat = new THREE.ShaderMaterial({
  vertexShader:   vertShader,
  fragmentShader: fragShader,
  uniforms: {
    u_t: { value: 0.0 }   // simulation time, updated each frame in animate()
  },
});

// Create the mesh (geometry + material) and add to the scene.
// The geometry provides the tessellated sphere surface.
// ALL visual computation happens in the fragment shader —
// the geometry is just the canvas the shader paints on.
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.52, 160, 160),  // radius, width segments, height segments
  mat
));


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 7 — ATMOSPHERIC HALOS
//
// Two thin translucent shell spheres rendered from their INSIDE SURFACE
// (THREE.BackSide), slightly larger than the main sphere.
// Each uses a simple rim-glow shader:
//   intensity = pow(1 − |facing|, power) × alpha
// where |facing| = abs(vVN.z) is 0 at the silhouette edge and 1 at centre.
//
// AdditiveBlending: the halo's RGB is ADDED to whatever colour is behind it,
// so it can only brighten (never darken) the scene.  Stars show through it.
//
// depthWrite: false prevents the halo from writing to the Z-buffer, which
// would incorrectly occlude objects rendered behind it.
//
// Halo 1 — tight inner blue corona (r=1.78, power=2.5):
//   Narrow bright ring just outside the sphere surface.
//   The high power exponent (2.5) concentrates intensity near the rim.
//   Deep blue (0.01, 0.04, 0.50) reinforces the inhibitory colour signature.
//
// Halo 2 — wide soft outer glow (r=2.18, power=1.5):
//   Broader diffuse suggestion of depth and atmosphere.
//   Low alpha (0.14) keeps it barely-there — a hint, not a strong feature.
// ═════════════════════════════════════════════════════════════════════════════

const makeHalo = (radius, power, alpha, r, g, b) => {

  scene.add(new THREE.Mesh(

    new THREE.SphereGeometry(radius, 48, 48),  // low-poly — halos don't need fine detail

    new THREE.ShaderMaterial({

      // Vertex shader: only needs the view-space normal to compute rim intensity.
      vertexShader: `
        varying vec3 vVN;
        void main() {
          vVN = normalize(normalMatrix * normal);   // view-space normal for rim calc
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,

      // Fragment shader: pure rim glow.
      // rim = 0 at sphere centre (facing camera), 1 at extreme edge.
      // alpha = pow(rim, power) × opacity_scale
      fragmentShader: `
        precision mediump float;
        varying vec3 vVN;
        void main() {
          float rim = 1.0 - abs(vVN.z);                         // rim brightness factor
          float a   = pow(rim, ${power.toFixed(1)}) * ${alpha.toFixed(2)};   // concentrated at rim
          gl_FragColor = vec4(${r.toFixed(2)}, ${g.toFixed(2)}, ${b.toFixed(2)}, a);
        }`,

      transparent: true,
      blending:    THREE.AdditiveBlending,   // adds to scene, never darkens
      side:        THREE.BackSide,           // render the INNER surface of the shell
      depthWrite:  false,                    // don't write Z-buffer — prevents occlusion bugs
    })
  ));
};

makeHalo(1.78, 2.5, 0.44, 0.01, 0.04, 0.50);  // inner tight blue corona
makeHalo(2.18, 1.5, 0.14, 0.01, 0.02, 0.32);  // outer wide soft halo


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 8 — RESPONSIVE RESIZE
//
// Three.js cameras use VERTICAL FOV by default.  If we fix the FOV:
//   • On ultra-wide screens, the horizontal dimension clips the sphere.
//   • On portrait / mobile screens, the vertical dimension clips it.
//
// Instead we compute the FOV dynamically every time the window size changes,
// choosing the angle that guarantees a circle of FIT_R world-units fits
// entirely inside whichever dimension (width or height) is the smaller one.
//
// Derivation:
//   We need the VERTICAL FOV (Three.js convention).
//   The sphere must fit inside the screen's smaller dimension.
//
//   Landscape (W ≥ H):
//     Height is the tight dimension.
//     Distance from camera to sphere edge = FIT_R world-units.
//     tan(halfFOV) = FIT_R / CAM_Z   → halfFOV = atan(FIT_R / CAM_Z)
//
//   Portrait (W < H):
//     Width is the tight dimension.  We want FIT_R to fit in half the width.
//     In Three.js, horizontal FOV = vertical FOV × aspect.
//     We need: tan(halfHFOV) = FIT_R / CAM_Z
//     And:     halfHFOV = halfVFOV × aspect
//     So:      tan(halfVFOV × aspect) = FIT_R / CAM_Z  is NOT linear — approximate:
//     Use:     halfVFOV ≈ atan(FIT_R / (aspect × CAM_Z))
//              This is exact in the small-angle regime and sufficient here.
// ═════════════════════════════════════════════════════════════════════════════

function onResize() {

  const W = window.innerWidth  || 300;  // current viewport width  (fallback 300 for unit tests)
  const H = window.innerHeight || 300;  // current viewport height

  // Resize the WebGL framebuffer to match the new viewport.
  // The false flag means "don't resize the canvas CSS element" — we do that via CSS above.
  renderer.setSize(W, H, false);

  // Update the camera's aspect ratio to match the new viewport shape.
  camera.aspect = W / H;

  const aspect = camera.aspect;

  // Compute the half-angle such that FIT_R fits in the smaller viewport dimension.
  const halfRad = (aspect >= 1)
    ? Math.atan(FIT_R / CAM_Z)                // landscape: height is the tight axis
    : Math.atan(FIT_R / (aspect * CAM_Z));    // portrait:  width is the tight axis

  // Convert from radians to degrees (Three.js uses degrees for FOV).
  camera.fov = 2 * halfRad * (180 / Math.PI);

  // MUST call this after changing camera.fov or camera.aspect —
  // without it, the projection matrix is not updated and the view stays wrong.
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', onResize);  // update on every window resize event
onResize();                                    // call once immediately to initialise correctly


// ═════════════════════════════════════════════════════════════════════════════
// SECTION 9 — ANIMATION LOOP
//
// requestAnimationFrame (rAF) asks the browser to call animate() before the
// NEXT screen repaint, synchronised to the display's refresh rate (60, 90,
// or 120 fps depending on hardware).  This is far more efficient than
// setInterval — it pauses automatically when the tab is backgrounded.
//
// SEAMLESS LOOP:
//   t advances by dt each frame and is wrapped modulo T_LOOP.
//   T_LOOP = 20π ≈ 62.83 simulation-time units.
//   Because all cosine frequencies w_l = n_l × 0.1, and w_l × T_LOOP = 2π × n_l,
//   every term returns to its initial value at t = T_LOOP exactly.
//   The modulo reset is therefore invisible — no pop, no seam.
//
// ROTATION:
//   Y-axis: slow continuous spin reveals all sides of the eigenmode pattern.
//   X-axis: gentle sinusoidal rocking, also looped — using sin(t × 0.1)
//            whose period = 2π/0.1 = T_LOOP, so the tilt also loops perfectly.
// ═════════════════════════════════════════════════════════════════════════════

// Loop period in simulation-time units.
// T_LOOP = 20π so that w_base = 2π/T_LOOP = 0.1 exactly.
const T_LOOP = 20.0 * Math.PI;   // ≈ 62.8318 simulation-time units

// Time step per frame.  Larger than v1's 0.016 for faster overall motion.
// Real-time loop ≈ T_LOOP / dt / 60fps = 62.83 / 0.022 / 60 ≈ 47.6 seconds.
const dt = 0.022;

// Current simulation time.  Will be wrapped within [0, T_LOOP) forever.
let t = 0.0;

// Find the main sphere mesh so we can rotate it each frame.
// We search for the first Mesh that uses our custom ShaderMaterial 'mat'.
const sphereMesh = scene.children.find(c => c.isMesh && c.material === mat);

function animate() {

  // Schedule the next frame before doing any work — this ensures we stay
  // synced to the display even if the frame takes slightly longer than usual.
  requestAnimationFrame(animate);

  // Advance simulation time and wrap at T_LOOP.
  // The modulo (%) ensures t stays in [0, T_LOOP) forever, producing
  // a mathematically perfect seamless loop.
  t = (t + dt) % T_LOOP;

  // Send the updated time to the GPU shader as a uniform variable.
  // This is the only CPU→GPU communication per frame — very efficient.
  mat.uniforms.u_t.value = t;

  if (sphereMesh) {

    // Slow Y-axis rotation: 0.0016 rad/frame at 60fps ≈ 5.5°/s.
    // Full 360° rotation in ≈ 390 s ≈ 6.5 minutes.
    // This gradually reveals all azimuths of the eigenmode pattern.
    sphereMesh.rotation.y += 0.0016;

    // Gentle X-axis rocking using a sinusoid.
    // Frequency = 0.1 rad/sim-unit = 1 × w_base → period = T_LOOP.
    // The tilt loops in perfect sync with the shader, so the rocking
    // also resets seamlessly at the loop boundary.
    // Range: 0.14 ± 0.05 radians (≈ 8° ± 3°) — a subtle, organic wobble.
    sphereMesh.rotation.x = 0.14 + 0.05 * Math.sin(t * 0.1);
  }

  // Render the scene from the camera's perspective onto the canvas.
  renderer.render(scene, camera);
}

animate();   // kick off the animation loop — runs forever until the page closes

</script>
</body>
